name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version without the leading v, for example 0.1.0'
        required: true
        type: string

concurrency:
  group: '${{ github.workflow }} @ ${{ github.ref }}'
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$version" ]; then
            echo "Release version could not be resolved." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          mvn -B -Drevision="${{ steps.version.outputs.version }}" -Prelease-assets -pl spring-boot/server/spring-boot-server-autoconfigure,spring-boot/server/rest/spring-boot-server-rest,spring-boot/server/rest/spring-boot-starter-server-rest -am verify

      - name: Collect release artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm -rf release-assets
          mkdir -p release-assets

          modules=(
            "spring-boot/server/spring-boot-server-autoconfigure|a2a-spring-boot-server-autoconfigure"
            "spring-boot/server/rest/spring-boot-server-rest|a2a-spring-boot-server-rest"
            "spring-boot/server/rest/spring-boot-starter-server-rest|a2a-spring-boot-starter-server-rest"
          )

          version="${{ steps.version.outputs.version }}"

          for entry in "${modules[@]}"; do
            module="${entry%%|*}"
            artifact="${entry##*|}"
            cp "$module/target/$artifact-$version.jar" "release-assets/"
            cp "$module/target/$artifact-$version-sources.jar" "release-assets/"
            cp "$module/target/$artifact-$version-javadoc.jar" "release-assets/"
          done

          (cd release-assets && sha256sum * > SHA256SUMS.txt)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Spring A2A ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            release-assets/*
