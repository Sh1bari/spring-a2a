name: Check Spring Java Format

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/docs/**'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/docs/**'
  workflow_dispatch:

concurrency:
  group: '${{ github.workflow }} @ ${{ github.head_ref || github.ref }}'
  cancel-in-progress: true

jobs:
  spring-javaformat:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Validate Spring Java Format
        run: mvn -B -f pom.xml spring-javaformat:validate

